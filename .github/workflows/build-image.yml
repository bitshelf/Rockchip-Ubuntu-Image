name: Build Ubuntu Image for MYD-LR3576

on:
  push:
    branches: [main]
    paths:
      - 'myd-lr3576/**'
      - '.github/workflows/build-image.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      ubuntu_series:
        description: 'Ubuntu series'
        required: true
        type: choice
        options:
          - noble
          - questing
        default: noble

env:
  DEBIAN_FRONTEND: noninteractive

jobs:
  # =========================================================================
  # Build rootfs on amd64 host with QEMU arm64 cross-build
  # (ubuntu-24.04-arm runner not yet available for all repos)
  # =========================================================================
  build-rootfs:
    name: Build ${{ inputs.ubuntu_series || 'noble' }} rootfs
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            qemu-user-static binfmt-support \
            gdisk e2fsprogs xz-utils dosfstools \
            u-boot-tools device-tree-compiler \
            snapd
          sudo systemctl restart systemd-binfmt
          sudo systemctl restart snapd

      - name: Install ubuntu-image
        run: |
          sudo snap wait system seed.loaded
          sudo snap install ubuntu-image --classic --channel=3.x/stable
          /snap/bin/ubuntu-image version

      - name: Select image definition
        id: select
        run: |
          SERIES="${{ inputs.ubuntu_series || 'noble' }}"
          echo "series=${SERIES}" >> $GITHUB_OUTPUT
          if [[ "${SERIES}" == "questing" ]]; then
            echo "def_file=image-definition-questing.yaml" >> $GITHUB_OUTPUT
            echo "img_prefix=ubuntu-26.04" >> $GITHUB_OUTPUT
          else
            echo "def_file=image-definition.yaml" >> $GITHUB_OUTPUT
            echo "img_prefix=ubuntu-24.04" >> $GITHUB_OUTPUT
          fi

      - name: Patch py3compile (workaround QEMU BrokenPipeError)
        run: |
          # Create wrapper scripts to intercept py3compile during build
          sudo mkdir -p /usr/local/bin
          cat << 'WRAP' | sudo tee /usr/local/bin/py3compile > /dev/null
          #!/bin/bash
          # QEMU workaround: skip Python bytecode compilation
          exit 0
          WRAP
          sudo chmod +x /usr/local/bin/py3compile
          cat << 'WRAP' | sudo tee /usr/local/bin/py3clean > /dev/null
          #!/bin/bash
          exit 0
          WRAP
          sudo chmod +x /usr/local/bin/py3clean
          # Add to PATH before /usr/bin so wrappers take precedence
          echo "PATH=/usr/local/bin:\$PATH" >> $GITHUB_ENV

      - name: Run ubuntu-image classic
        run: |
          cd myd-lr3576
          mkdir -p artifacts
          sudo PATH="/usr/local/bin:$PATH" /snap/bin/ubuntu-image classic \
            "${{ steps.select.outputs.def_file }}" \
            --output-dir artifacts/ \
            2>&1 | tee artifacts/ubuntu-image.log

      - name: Verify rootfs tarball
        run: |
          cd myd-lr3576/artifacts
          if [[ -f rootfs.tar.gz ]]; then
            ls -lh rootfs.tar.gz
            echo "=== Manifest ==="
            wc -l *.manifest
          else
            echo "ERROR: rootfs.tar.gz not found!"
            echo "=== Build log (last 50 lines) ==="
            tail -50 ubuntu-image.log
            exit 1
          fi

      - name: Run Ubuntu official test suite
        run: |
          cd myd-lr3576
          sudo bash tests/qemu-test.sh

      - name: Upload rootfs artifact
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-rootfs-${{ steps.select.outputs.series }}-arm64
          path: |
            myd-lr3576/artifacts/rootfs.tar.gz
            myd-lr3576/artifacts/*.manifest
            myd-lr3576/artifacts/*.filelist
            myd-lr3576/artifacts/ubuntu-image.log
            myd-lr3576/artifacts/test-report.txt
          retention-days: 7

      - name: Upload on release
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-${{ steps.select.outputs.series }}-myd-lr3576-release
          path: |
            myd-lr3576/artifacts/rootfs.tar.gz
            myd-lr3576/artifacts/*.manifest
            myd-lr3576/artifacts/test-report.txt
          retention-days: 30
