name: Build Ubuntu Image for MYD-LR3576

on:
  push:
    branches: [main]
    paths:
      - 'ubuntu/**'
      - '.github/workflows/build-image.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      ubuntu_series:
        description: 'Ubuntu series'
        required: true
        type: choice
        options:
          - noble
          - questing
        default: noble

permissions:
  contents: write

env:
  DEBIAN_FRONTEND: noninteractive

jobs:
  # =========================================================================
  # Build rootfs on amd64 host with QEMU arm64 cross-build
  # (ubuntu-24.04-arm runner not yet available for all repos)
  # =========================================================================
  build-rootfs:
    name: Build ${{ inputs.ubuntu_series || 'noble' }} rootfs
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install host dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            qemu-user-static binfmt-support \
            debootstrap germinate \
            gdisk e2fsprogs xz-utils dosfstools \
            u-boot-tools device-tree-compiler \
            golang-go git
          sudo systemctl restart systemd-binfmt

      - name: Build ubuntu-image from source
        run: |
          # ubuntu-image snap cannot be installed in CI runners
          # Build from source (canonical/ubuntu-image main branch)
          git clone --depth 1 https://github.com/canonical/ubuntu-image.git /tmp/ubuntu-image-src
          cd /tmp/ubuntu-image-src
          go build -o ubuntu-image ./cmd/ubuntu-image
          sudo cp ubuntu-image /usr/local/bin/ubuntu-image
          echo "ubuntu-image built successfully"

      - name: Select image definition
        id: select
        run: |
          SERIES="${{ inputs.ubuntu_series || 'noble' }}"
          echo "series=${SERIES}" >> $GITHUB_OUTPUT
          if [[ "${SERIES}" == "questing" ]]; then
            echo "def_file=image-definition-questing.yaml" >> $GITHUB_OUTPUT
            echo "img_prefix=ubuntu-26.04" >> $GITHUB_OUTPUT
          else
            echo "def_file=image-definition.yaml" >> $GITHUB_OUTPUT
            echo "img_prefix=ubuntu-24.04" >> $GITHUB_OUTPUT
          fi

      - name: Run ubuntu-image (until install_packages)
        run: |
          cd ubuntu
          mkdir -p artifacts
          sudo /usr/local/bin/ubuntu-image classic \
            "${{ steps.select.outputs.def_file }}" \
            --output-dir artifacts/ \
            --workdir /tmp/ui-work \
            --until install_packages \
            2>&1 | tee artifacts/ubuntu-image-step1.log

      - name: Patch chroot (QEMU + snap workarounds)
        run: |
          # 1. Use dpkg-divert to permanently replace py3compile with no-op
          # Regular file overwrite gets undone when python3-minimal is installed
          sudo chroot /tmp/ui-work/chroot dpkg-divert --local --rename --add /usr/bin/py3compile 2>/dev/null || true
          sudo bash -c 'cat > /tmp/ui-work/chroot/usr/bin/py3compile << "EOF"
          #!/bin/bash
          exit 0
          EOF'
          sudo chmod +x /tmp/ui-work/chroot/usr/bin/py3compile
          sudo chroot /tmp/ui-work/chroot dpkg-divert --local --rename --add /usr/bin/py3clean 2>/dev/null || true
          sudo bash -c 'cat > /tmp/ui-work/chroot/usr/bin/py3clean << "EOF"
          #!/bin/bash
          exit 0
          EOF'
          sudo chmod +x /tmp/ui-work/chroot/usr/bin/py3clean
          echo "py3compile permanently patched via dpkg-divert"

          # 2. Purge snapd to prevent snap-preseed failure
          sudo chroot /tmp/ui-work/chroot apt-get purge -y -qq snapd 2>/dev/null || true
          sudo chroot /tmp/ui-work/chroot apt-get autopurge -y -qq 2>/dev/null || true
          echo "snapd purged from chroot"

      - name: Resume ubuntu-image classic
        run: |
          cd ubuntu
          sudo /usr/local/bin/ubuntu-image classic \
            "${{ steps.select.outputs.def_file }}" \
            --output-dir artifacts/ \
            --workdir /tmp/ui-work \
            --resume \
            2>&1 | tee artifacts/ubuntu-image.log

      - name: Verify rootfs tarball
        run: |
          cd ubuntu/artifacts
          if [[ -f rootfs.tar.gz ]]; then
            ls -lh rootfs.tar.gz
            echo "=== Manifest ==="
            wc -l *.manifest
          else
            echo "ERROR: rootfs.tar.gz not found!"
            echo "=== Build log (last 50 lines) ==="
            tail -50 ubuntu-image.log
            exit 1
          fi

      - name: Run Ubuntu official test suite
        run: |
          cd ubuntu
          sudo bash tests/qemu-test.sh

      - name: Upload rootfs artifact
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-rootfs-${{ steps.select.outputs.series }}-arm64
          path: |
            ubuntu/artifacts/rootfs.tar.gz
            ubuntu/artifacts/*.manifest
            ubuntu/artifacts/*.filelist
            ubuntu/artifacts/ubuntu-image.log
            ubuntu/artifacts/test-report.txt
          retention-days: 7

      - name: Create/Update Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          name: "Ubuntu ${{ steps.select.outputs.series }} for RK3576"
          tag_name: "${{ steps.select.outputs.series }}-latest"
          body: |
            Ubuntu ${{ steps.select.outputs.series }} rootfs for Rockchip RK3576

            - Image: `${{ steps.select.outputs.img_prefix }}-preinstalled-server-arm64+rk3576`
            - Architecture: arm64
            - Built: $(date -u +%Y-%m-%dT%H:%M:%SZ)

            See [BUILD.md](docs/BUILD.md) for flashing instructions.
          files: |
            ubuntu/artifacts/rootfs.tar.gz
            ubuntu/artifacts/*.manifest
            ubuntu/artifacts/test-report.txt
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
