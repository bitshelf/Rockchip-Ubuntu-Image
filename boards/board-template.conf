# ==========================================================================
# Board Configuration Template
#
# Copy this file to boards/<your-board>.conf and customize.
# All values marked with TODO must be set.
# Reference: boards/myd-lr3576.conf for a complete working example.
# ==========================================================================

# --- Board Identification ---
BOARD_NAME="myboard"                        # TODO: short name (e.g. rk3588-board)
BOARD_VENDOR="VendorName"                   # TODO
BOARD_MODEL="ModelName"                     # TODO
SOC_FAMILY="rockchip"                       # rockchip | allwinner | amlogic
SOC_MODEL="rk3588"                          # TODO: rk3576 | rk3588 | rk3568 | h616 | etc

# --- Image Naming ---
IMAGE_HOSTNAME="${BOARD_NAME}"
IMAGE_DISPLAY_NAME="Ubuntu Server ${BOARD_VENDOR} ${BOARD_MODEL}"
IMAGE_NAME_PREFIX="ubuntu-server-${BOARD_NAME}"

# --- Bootloader ---
IDBLOADER_SOURCE="rk3588_spl_loader_v1.0.bin"  # TODO
UBOOT_SOURCE="uboot.img"                        # TODO: or u-boot.itb
BOOTIMG_SOURCE="boot.img"

# --- Device Tree ---
DTB_BASE="myboard.dtb"           # TODO
DTS_FILE="myboard.dts"           # TODO
OVERLAY_PATTERN="myboard-*-overlay.dtbo"  # TODO

# --- Partition Layout (sectors) ---
PART_BOOT_START=32768
PART_BOOT_SIZE_MB=256
PART_ROOTFS_SIZE_MB=6144
PART_OVERLAY_SIZE_MB=512
DISK_SIZE_MB=8192
LBA_IDBLOADER=64
LBA_UBOOT=16384

# --- Serial Console ---
SERIAL_CONSOLE_DEV="ttyS2"                   # TODO: Rockchip=ttyFIQ0, Allwinner=ttyS0
SERIAL_CONSOLE_BAUD="1500000"                # TODO: usually 115200 or 1500000
SERIAL_CONSOLE_PARAMS="console=${SERIAL_CONSOLE_DEV},${SERIAL_CONSOLE_BAUD}n8 rw rootwait root=PARTLABEL=rootfs rootfstype=ext4"  # TODO

# --- Source URIs (Yocto-style SRC_URI) ---
# Protocol support: file:// | https:// | git://
# Build system tries local cache first, then fetches from URI

UBOOT_URI="https://github.com/rockchip-linux/u-boot.git"  # TODO
UBOOT_SRCREV="master"
UBOOT_DEFCONFIG="rk3588_defconfig"                        # TODO

KERNEL_URI="https://github.com/rockchip-linux/kernel.git" # TODO
KERNEL_SRCREV="develop-6.1"
KERNEL_DEFCONFIG="rockchip_linux_defconfig"                # TODO: or sunxi_defconfig for Allwinner

RKBIN_URI="https://github.com/rockchip-linux/rkbin.git"   # TODO: Rockchip only

TOOLCHAIN_URI="file:///opt/toolchains/gcc-arm-10.3-x86_64-aarch64-none-linux-gnu"  # TODO
TOOLCHAIN_PREFIX="aarch64-linux-gnu-"

# --- Kernel ---
KERNEL_CFG_FRAGMENTS=""                      # TODO: SoC-specific config fragments
KERNEL_VERSION="6.1.118"                     # TODO
KERNEL_BOOT_TYPE="fit"

# --- GPU ---
MALI_GPU_VARIANT="g610"  # TODO: RK3588=G610, RK3576=G31, RK3568=G52

# --- Extra kernel modules ---
KERNEL_MODULES=(
    # TODO: board-specific modules
)
