# ==========================================================================
# Board Configuration: MYiR MYD-LR3576 (Rockchip RK3576)
#
# This file contains all board-specific hardcoded values.
# To add a new board, copy this file and modify the values.
# All build scripts source this config and reference variables only.
# ==========================================================================

# --- Board Identification ---
BOARD_NAME="myd-lr3576"
BOARD_VENDOR="MYiR"
BOARD_MODEL="MYD-LR3576"
SOC_FAMILY="rockchip"
SOC_MODEL="rk3576"

# --- Image Naming ---
IMAGE_HOSTNAME="myd-lr3576"
IMAGE_DISPLAY_NAME="Ubuntu Server MYiR MYD-LR3576"
IMAGE_NAME_PREFIX="ubuntu-server-myd-lr3576"

# --- Bootloader (from SDK u-boot/) ---
# idbloader: SPL + DDR init binary, written to raw LBA 64
IDBLOADER_SOURCE="rk3576_spl_loader_v1.09.108.bin"
# u-boot: U-Boot proper FIT image, written to raw LBA 16384
UBOOT_SOURCE="uboot.img"
# Kernel FIT image (from SDK kernel build)
BOOTIMG_SOURCE="boot.img"

# --- Device Tree ---
# Base DTB filename (without path)
DTB_BASE="myd-lr3576.dtb"
# DTS file for the board
DTS_FILE="myd-lr3576.dts"
# Overlay DTBO directory in kernel source
OVERLAY_SOURCE_DIR="arch/arm64/boot/dts/rockchip"
# Overlay glob pattern
OVERLAY_PATTERN="myd-lr3576-*-overlay.dtbo"

# --- Partition Layout (from rockdev/parameter.txt) ---
# All values in sectors (512 bytes/sector)
PART_BOOT_START=32768     # 0x8000
PART_BOOT_SIZE_MB=256
PART_ROOTFS_SIZE_MB=6144
PART_OVERLAY_SIZE_MB=512
DISK_SIZE_MB=8192

# Raw bootloader sector offsets
LBA_IDBLOADER=64          # 0x40
LBA_UBOOT=16384           # 0x4000

# --- Partition Labels ---
BOOT_LABEL="boot"
ROOTFS_LABEL="rootfs"
OVERLAY_LABEL="overlay"

# --- Serial Console ---
# Rockchip uses FIQ debugger UART as primary console
SERIAL_CONSOLE_DEV="ttyFIQ0"
SERIAL_CONSOLE_BAUD="1500000"
SERIAL_CONSOLE_PARAMS="earlycon=uart8250,mmio32,0x2a340000 console=ttyFIQ0,1500000n8"

# --- Kernel ---
KERNEL_SOURCE_DIR="kernel-6.1"
KERNEL_DEFCONFIG="rockchip_linux_defconfig"
KERNEL_CFG_FRAGMENTS="rk3576.config rockchip_linux_docker.config"
KERNEL_VERSION="6.1.118"
KERNEL_BOOT_TYPE="fit"     # FIT image (U-Boot bootm)

# --- Rockchip GPU ---
MALI_GPU_VARIANT="g31"     # RK3576 uses Mali-G31

# --- SDK Paths ---
SDK_UBOOT_DIR="u-boot"
SDK_KERNEL_DIR="kernel-6.1"
SDK_OUTPUT_DIR="output/firmware"
SDK_EXTERNAL_DIR="external"
SDK_RKBIN_DIR="rkbin"
SDK_PARAMETER_FILE="rockdev/parameter.txt"

# --- Ubuntu Image Definition ---
UBUNTU_SERIES_DEFAULT="noble"
UBUNTU_MIRROR="https://mirrors.ustc.edu.cn/ubuntu-ports/"
UBUNTU_SEEDS="server minimal standard"
UBUNTU_CLASS="preinstalled"
UBUNTU_ARCH="arm64"

# --- Default User ---
DEFAULT_USER="ubuntu"
DEFAULT_PASSWORD="ubuntu"

# --- Extra kernel modules to load at boot ---
KERNEL_MODULES=(
    rockchipdrm
    rockchip_saradc
    rockchip_thermal
    rk_vcodec
    rga2
    mpp_vcodec
)
